name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]
jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: threeal/setup-pnpm-action@v1.0.0
        with:
          version: 10.33.4

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm prettier --check .

      - name: Check lint
        run: pnpm eslint

      - name: Check types
        run: pnpm tsc

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm rollup -c && git diff --exit-code dist

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          path: mkdir-action
          sparse-checkout: |
            action.yml
            dist
          sparse-checkout-cone-mode: false

      - name: Create directory
        uses: ./mkdir-action
        with:
          path: parent/child

      - name: Check directory
        shell: bash
        run: test -d parent/child
